version: "3.9"

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      # 로컬 코드 변경사항이 컨테이너에 바로 반영 (--reload 효과)
      - ./backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      - db

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: coverletter
      POSTGRES_PASSWORD: coverletter
      POSTGRES_DB: coverletter
    ports:
      - "5432:5432"
    volumes:
      # DB 데이터 영속성 보장 — 컨테이너 재시작해도 데이터 유지
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: